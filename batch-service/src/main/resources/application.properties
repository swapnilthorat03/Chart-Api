# ---------------------------
# Application and Server Config
# ---------------------------
spring.application.name=batch-service
server.port=8082

# ---------------------------
# Datasource Configuration
# ---------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/csv_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=swapnil8262
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------
# JPA / Hibernate Configuration
# ---------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ---------------------------
# Spring Batch Configuration
# ---------------------------
spring.batch.job.enabled=true
spring.batch.jdbc.initialize-schema=always

# ---------------------------
# Multipart File Upload Configuration
# ---------------------------
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ---------------------------
# Eureka Client Configuration
# ---------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# ---------------------------
# Logging Level (Optional for Debug)
# ---------------------------
logging.level.org.springframework=INFO
logging.level.com.jdk=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always