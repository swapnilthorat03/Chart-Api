spring.application.name=api-gateway
server.port=8084

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.routes[0].id=batch-service
spring.cloud.gateway.routes[0].uri=lb://BATCH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/batch/**

spring.cloud.gateway.routes[1].id=upload-service
spring.cloud.gateway.routes[1].uri=lb://UPLOAD-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/upload/**

spring.cloud.gateway.routes[2].id=analytics-service
spring.cloud.gateway.routes[2].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/analytics/**

management.endpoints.web.exposure.include=*
logging.level.org.springframework.cloud.gateway=DEBUG